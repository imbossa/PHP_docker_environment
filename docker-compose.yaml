x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  php:
    build:
      context: ./app/php
      args:
        - PHP_VERSION=${PHP_VERSION}
    environment:
      TZ: ${TIMEZONE}
    volumes:
      - "${LOCAL_WEB_PATH}:/var/www"
      - "${LOCAL_STORAGE_PATH}/app/php/ext:/etc/php/my_ext"
      - "${LOCAL_STORAGE_PATH}/app/php/php.ini:/usr/local/etc/php/php.ini:ro"
      - "${LOCAL_STORAGE_PATH}/app/php/php-fpm.d/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro"
      - "${LOCAL_STORAGE_PATH}/app/php/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro"
      - "${LOCAL_STORAGE_PATH}/app/php/cron.d/prod_demo:/etc/cron.d/prod_demo:ro"
      - "${LOCAL_STORAGE_PATH}/app/php/supervisor:/etc/supervisor"
      - "${LOCAL_STORAGE_PATH}/app/php/logs:/var/log/php"
    ports:
      - "9000:9000"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      my_com:
        ipv4_address: ${IPV4_PREFIX:-"172.28.1."}11
    container_name: ${CONTAINER_PREFIX:-"com_"}php
    dns: 8.8.8.8
    restart: unless-stopped
    logging: *default-logging

  nginx:
    build:
      context: ./app/nginx
      args:
        - NGINX_VERSION=${NGINX_VERSION}
    environment:
      TZ: ${TIMEZONE}
    volumes:
      - "${LOCAL_STORAGE_PATH}/app/nginx/conf.d:/etc/nginx/conf.d"
      - "${LOCAL_STORAGE_PATH}/app/nginx/snippets:/etc/nginx/snippets:ro"
      - "${LOCAL_STORAGE_PATH}/app/nginx/ca:/etc/nginx/ca"
      - "${LOCAL_STORAGE_PATH}/app/nginx/my_modules:/etc/nginx/my_modules"
      - "${LOCAL_STORAGE_PATH}/app/nginx/nginx.conf:/etc/nginx/nginx.conf"
      - "${LOCAL_STORAGE_PATH}/app/nginx/mime.types:/etc/nginx/mime.types:ro"
      - "${LOCAL_WEB_PATH}:/var/www"
      - "${LOCAL_STORAGE_PATH}/app/secure:/opt/secure:ro"
      - "${LOCAL_STORAGE_PATH}/app/nginx/logs:/var/log/nginx"
      - "${LOCAL_STORAGE_PATH}/app/nginx/letsencrypt:/etc/letsencrypt"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    networks:
      my_com:
        ipv4_address: ${IPV4_PREFIX:-"172.28.1."}12
    ports:
      - "80:80"
      - "443:443"
      - "8008-8008:8008-8008"
    container_name: ${CONTAINER_PREFIX:-"com_"}nginx
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: ${REDIS_VERSION}
    pull_policy: missing
    environment:
      TZ: ${TIMEZONE}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - "${LOCAL_STORAGE_PATH}/app/redis/conf.d/redis.conf:/usr/local/etc/redis/redis.conf:ro"
      - "${LOCAL_STORAGE_PATH}/app/redis/db:/data"
    networks:
      my_com:
        ipv4_address: ${IPV4_PREFIX:-"172.28.1."}14
    ports:
      - "6379:6379"
    sysctls:
      - net.core.somaxconn=1024
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    container_name: ${CONTAINER_PREFIX:-"com_"}redis
    restart: unless-stopped
    logging: *default-logging

  mysql:
    image: ${MYSQL_VERSION}
    pull_policy: missing
    environment:
      TZ: ${TIMEZONE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - "${LOCAL_STORAGE_PATH}/app/mysql/db:/var/lib/mysql"
      - "${LOCAL_STORAGE_PATH}/app/mysql/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro"
    networks:
      my_com:
        ipv4_address: ${IPV4_PREFIX:-"172.28.1."}13
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    container_name: ${CONTAINER_PREFIX:-"com_"}mysql
    restart: unless-stopped
    logging: *default-logging

  mongo:
    image: ${MONGO_VERSION}
    pull_policy: missing
    environment:
      TZ: ${TIMEZONE}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    command: ["mongod", "--config", "/etc/mongo/mongod.conf"]
    volumes:
      - "${LOCAL_STORAGE_PATH}/app/mongo/config/mongodb.conf:/etc/mongo/mongod.conf:ro"
      - "${LOCAL_STORAGE_PATH}/app/mongo/db:/data/db"
      - "${LOCAL_STORAGE_PATH}/app/mongo/logs:/var/log/mongodb"
    networks:
      my_com:
        ipv4_address: ${IPV4_PREFIX:-"172.28.1."}16
    ports:
      - "27017:27017"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    container_name: ${CONTAINER_PREFIX:-"com_"}mongo
    restart: unless-stopped
    logging: *default-logging

  rabbitmq:
    image: ${RABBITMQ_VERSION}
    pull_policy: missing
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      TZ: ${TIMEZONE}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_NODENAME: rabbit@rabbitmq
    volumes:
      - "${LOCAL_STORAGE_PATH}/app/rabbitmq/data/rabbitmq-4:/var/lib/rabbitmq"
      - "${LOCAL_STORAGE_PATH}/app/rabbitmq/conf.d/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro"
    networks:
      my_com:
        ipv4_address: ${IPV4_PREFIX:-"172.28.1."}20
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    container_name: ${CONTAINER_PREFIX:-"com_"}rabbitmq
    restart: unless-stopped
    logging: *default-logging

networks:
  my_com:
    name: ${NETWORK_EXT_NAME:-my_com}
    driver: bridge
    external: true
